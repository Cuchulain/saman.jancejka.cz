<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Šamanský buben — kruh s křížem čtyř světových stran -->
  <!-- Rám bubnu -->
  <circle cx="64" cy="64" r="54" stroke="currentColor" stroke-width="10"/>
  <!-- Kříž čtyř světových stran -->
  <line x1="64" y1="10" x2="64" y2="118" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
  <line x1="10" y1="64" x2="118" y2="64" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
  <!-- Střed -->
  <circle cx="64" cy="64" r="8" fill="currentColor"/>
  <style>
    svg { color: #000; }
    @media (prefers-color-scheme: dark) { svg { color: #fff; } }
  </style>
</svg>
